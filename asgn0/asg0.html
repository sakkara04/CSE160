<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>Draw a blue rectangle (canvas version)</title>
    </head>

    <body onload="main()">
        <canvas id="cnv" width="400" height="400">
            Please use a browser that supports "canvas"
        </canvas>
        
        <br/>
        <span>v1: </span>
        <label for="x_coord_v1">x</label>
        <input type="number" id="x_coord_v1"/>

        <label for="y_coord_v1">y</label>
        <input type="number" id="y_coord_v1"/>

        <br/>
        <br/>

        <span>v2: </span>
        <label for="x_coord_v2">x</label>
        <input type="number" id="x_coord_v2"/>

        <label for="y_coord_v2">y</label>
        <input type="number" id="y_coord_v2"/>

        <br/>
        <br/>

        <input type="button" onclick="handleDrawEvent()" value="Draw"/>

        <br/>
        <br/>

        <span>Operation: </span>
        <select name="operations" id="operation_select">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="divide">Divide</option>  
            <option value="multiply">Multiply</option> 
            <option value="angle">Angle Between</option>  
            <option value="area">Area</option>  
            <option value="magnitude">Magnitude</option>  
            <option value="normalize">Normalize</option>  
        </select>

        <label for="scalar">Scalar: </label>
        <input type="number" id="scalar"/>

        <br/>
        <br/>

        <input type="button" onclick="handleDrawOperationEvent()" value="Draw"/>


        <script src="asg0.js"></script>
        <script src="lib/cuon-matrix-cse160.js"></script>
    </body>
</html>
